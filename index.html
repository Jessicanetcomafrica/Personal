<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love, Compiled</title>
    <meta
      name="description"
      content="A romantic little coded poem with a cheesy quiz and a dreamy reveal."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-left"></div>
    <div class="backdrop backdrop-right"></div>

    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">A tiny coded confession</p>
        <h1 id="page-title">Love, Compiled.</h1>
        <p class="hero-copy">
          Answer a few shamelessly cheesy questions, then let the page reveal what
          my heart has been trying to say in a language I actually know.
        </p>
        <div class="hero-meta">
          <span id="dedication-pill" class="pill"></span>
          <button id="copy-link-button" class="ghost-button" type="button">
            Copy share link
          </button>
        </div>
      </section>

      <section class="card quiz-card" aria-live="polite">
        <div id="question-screen">
          <p class="step-label">Question <span id="question-number">1</span> / 3</p>
          <h2 id="question-text"></h2>
          <div id="answer-grid" class="answer-grid"></div>
          <p id="answer-feedback" class="answer-feedback"></p>
        </div>

        <div id="poem-screen" class="hidden">
          <div class="terminal-bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p class="poem-intro">Result: terminally in love</p>
          <h2 id="poem-title">for you, always</h2>
          <pre id="poem-block" class="poem-block"></pre>
          <p id="signature" class="signature"></p>
          <button id="restart-button" class="primary-button" type="button">
            Replay the questions
          </button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./script.js"></script>
  </body>
</html>
